<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기억의 한계: 1%의 도전</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Gaegu', cursive;
  overflow: hidden;
  position: relative;
}

/* ── 배경 ── */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  transition: background 1.2s ease;
}
.bg-scene {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.0s ease;
  pointer-events: none;
  background-size: cover;
  background-position: center top;
}
.bg-scene.active { opacity: 1; }
@media (max-width: 500px) {
  .bg-scene {
    background-size: cover;
    background-position: 30% top;
  }
}

/* ── 게임 컨테이너 ── */
.game-wrapper {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 0;
  width: 100%;
  max-width: 720px;
  padding: 0 8px;
}

/* 캐릭터 패널 */
.char-panel {
  width: 130px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  position: relative;
  height: 340px;
  pointer-events: none;
}
.char-panel svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(2px 4px 8px rgba(0,0,0,.18));
  transition: opacity .6s ease;
}
.char-stage { display: none; }
.char-stage.active { display: flex; width: 100%; height: 100%; align-items: flex-end; justify-content: center; }
.char-stage img { width: 100%; height: 100%; object-fit: contain; object-position: bottom; }

.char-left  { transform: scaleX(-1); }

.container {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 400px;
  padding: 16px 16px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

/* 간판 */
.signboard {
  background: rgba(139,37,0,0.92);
  border: 4px solid #5c1800;
  border-radius: 12px;
  padding: 8px 24px 10px;
  text-align: center;
  box-shadow: 0 4px 0 #3a0e00, 0 6px 16px rgba(0,0,0,0.4);
  position: relative;
  backdrop-filter: blur(4px);
}
.signboard::before, .signboard::after {
  content: '🔩'; position: absolute; top: 6px; font-size: 10px; opacity: .7;
}
.signboard::before { left: 8px; }
.signboard::after  { right: 8px; }
.sign-title {
  font-family: 'Nanum Pen Script', cursive;
  font-size: 26px; color: #ffe566;
  text-shadow: 2px 2px 0 #5c1800;
  line-height: 1.1; letter-spacing: 2px;
}
.sign-sub { font-size: 12px; color: #ffcf80; opacity: .9; letter-spacing: 1px; margin-top: 2px; }

/* 단계 배지 */
.stage-badge {
  background: rgba(255,248,220,0.93);
  border: 3px solid #c88a30;
  border-radius: 20px;
  padding: 5px 20px;
  font-family: 'Nanum Pen Script', cursive;
  font-size: 20px; color: #8B2500;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  transition: all 0.4s ease;
  letter-spacing: 1px;
}

/* 점수판 */
.stats-board {
  background: rgba(255,248,220,0.92);
  border: 3px solid #c88a30;
  border-radius: 12px;
  padding: 8px 28px;
  display: flex; gap: 36px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}
.stat { text-align: center; }
.stat-label { font-size: 11px; color: #9b6a20; letter-spacing: 1px; font-weight: 700; }
.stat-value { font-family: 'Nanum Pen Script', cursive; font-size: 30px; color: #5c2a00; line-height: 1; }

/* 버튼 그리드 */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }

.btn {
  aspect-ratio: 1;
  border: none; border-radius: 18px;
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 5px;
  transition: transform .12s cubic-bezier(.34,1.56,.64,1), filter .12s, box-shadow .12s;
  position: relative; overflow: hidden;
  will-change: transform, filter;
}
.btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.25) 0%, transparent 60%);
  border-radius: inherit; pointer-events: none;
}
/* 물결 ripple 레이어 */
.btn::after {
  content: ''; position: absolute;
  width: 120%; height: 120%; top: -10%; left: -10%;
  background: radial-gradient(circle, rgba(255,255,255,.5) 0%, transparent 70%);
  border-radius: 50%;
  transform: scale(0); opacity: 0;
  transition: transform .35s ease-out, opacity .35s ease-out;
  pointer-events: none;
}
.btn.ripple::after { transform: scale(1.2); opacity: 1; }

.btn.disabled { cursor: default; pointer-events: none; opacity: .75; }
.btn:active:not(.disabled) { transform: scale(.93); }

.fruit-emoji { font-size: clamp(34px,10vw,50px); line-height: 1; pointer-events: none; filter: drop-shadow(2px 3px 4px rgba(0,0,0,.25)); transition: transform .12s; }
.fruit-name  { font-family: 'Nanum Pen Script', cursive; font-size: 17px; font-weight: 700; pointer-events: none; text-shadow: 1px 1px 0 rgba(0,0,0,.2); }

/* 도형 SVG 아이콘 */
.shape-icon { width: clamp(44px,12vw,62px); height: clamp(44px,12vw,62px); pointer-events: none; transition: transform .12s; filter: drop-shadow(2px 3px 6px rgba(0,0,0,.3)); }
.shape-label { font-family: 'Nanum Pen Script', cursive; font-size: 16px; font-weight: 700; pointer-events: none; text-shadow: 1px 1px 0 rgba(0,0,0,.25); color: white; }

/* 빨강 동그라미 */
.btn-circle  { background: linear-gradient(145deg,#ff6b6b,#c0392b); border: 3px solid #922b21; box-shadow: 0 5px 0 #7b241c, 0 8px 16px rgba(192,57,43,.4); }
/* 파랑 네모 */
.btn-square  { background: linear-gradient(145deg,#64b5f6,#1565c0); border: 3px solid #0d47a1; box-shadow: 0 5px 0 #0a3576, 0 8px 16px rgba(21,101,192,.4); }
/* 노랑 세모 */
.btn-triangle{ background: linear-gradient(145deg,#fff176,#f9a825); border: 3px solid #b7770d; box-shadow: 0 5px 0 #8a5a00, 0 8px 16px rgba(249,168,37,.4); }
/* 초록 별 */
.btn-star    { background: linear-gradient(145deg,#a5d6a7,#2e7d32); border: 3px solid #1b5e20; box-shadow: 0 5px 0 #134016, 0 8px 16px rgba(46,125,50,.4); }

/* lit 효과 */
.btn.lit { filter: brightness(1.7) saturate(1.5); transform: scale(1.13) translateY(-5px) !important; }
.btn.lit .shape-icon { transform: scale(1.15); }
.btn-circle.lit  { box-shadow: 0 0 0 5px #ff6b6b, 0 0 40px 8px rgba(255,80,80,.75),  0 12px 0 #7b241c; }
.btn-square.lit  { box-shadow: 0 0 0 5px #64b5f6, 0 0 40px 8px rgba(100,181,246,.75), 0 12px 0 #0a3576; }
.btn-triangle.lit{ box-shadow: 0 0 0 5px #fff176, 0 0 40px 8px rgba(255,235,59,.75),  0 12px 0 #8a5a00; }
.btn-star.lit    { box-shadow: 0 0 0 5px #a5d6a7, 0 0 40px 8px rgba(100,221,100,.75), 0 12px 0 #134016; }

/* ── 플레이어 클릭 피드백 tap ── */
.btn.tap {
  filter: brightness(1.4) saturate(1.3);
  transform: scale(1.06) translateY(-2px) !important;
}

/* ── 오답 shake ── */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  15%     { transform: translateX(-8px) rotate(-2deg); }
  30%     { transform: translateX(8px)  rotate(2deg); }
  45%     { transform: translateX(-6px) rotate(-1deg); }
  60%     { transform: translateX(6px)  rotate(1deg); }
  75%     { transform: translateX(-3px); }
  90%     { transform: translateX(3px); }
}
.btn.wrong { animation: shake .45s ease forwards; filter: brightness(.7) sepia(.5); }

/* ── 정답 완성 pulse ── */
@keyframes correctPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.18) translateY(-4px); }
  70%  { transform: scale(.96); }
  100% { transform: scale(1); }
}
.btn.correct { animation: correctPop .35s cubic-bezier(.34,1.56,.64,1) forwards; }

/* 상태 버블 */
.status-bubble {
  background: rgba(255,248,220,0.92);
  border: 2px solid #c88a30; border-radius: 20px;
  padding: 5px 20px; font-size: 15px; color: #7a4a10;
  min-height: 34px; display: flex; align-items: center;
  justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,.15);
  letter-spacing: 1px;
}

/* ── 결과 오버레이 ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.82);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .3s; z-index: 100;
  backdrop-filter: blur(6px);
}
.overlay.visible { opacity: 1; pointer-events: all; }

/* 결과 화면 캐릭터 */
.result-chars {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 0;
  position: relative;
}
.result-char-left, .result-char-right {
  width: 90px;
  height: 200px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.result-char-left img, .result-char-right img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: bottom;
  filter: drop-shadow(2px 4px 8px rgba(0,0,0,.3));
}
.result-char-left  { transform: scaleX(-1); }

.result-card {
  background: #fffbee;
  border: 4px solid #c88a30; border-radius: 20px;
  padding: 32px 28px; text-align: center;
  max-width: 300px; width: 90%;
  box-shadow: 0 8px 0 #8B6000, 0 14px 40px rgba(0,0,0,.5);
  position: relative;
}
.result-card::before { content: '🏮'; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 30px; }

.result-stage-emoji { font-size: 48px; line-height: 1; margin-bottom: 4px; }
.result-stage-name  { font-family: 'Nanum Pen Script', cursive; font-size: 22px; color: #8B2500; margin-bottom: 10px; }
.result-line  { font-family: 'Nanum Pen Script', cursive; font-size: 18px; color: #9b6a20; margin-bottom: 4px; }
.result-round { font-family: 'Nanum Pen Script', cursive; font-size: 64px; color: #8B2500; line-height: 1; text-shadow: 3px 3px 0 rgba(139,37,0,.2); }
.result-unit  { font-size: 15px; color: #9b6a20; margin-bottom: 12px; }
.result-best  { font-size: 13px; color: #b8860b; margin-bottom: 8px; }
.result-best span { color: #8B2500; font-weight: 700; }
.result-seq   { font-size: 22px; letter-spacing: 5px; margin-bottom: 10px; min-height: 28px; }
.result-msg   { font-family: 'Nanum Pen Script', cursive; font-size: 19px; color: #7a4a10; margin-bottom: 24px; line-height: 1.5; }

.restart-btn {
  background: #8B2500; color: #ffe566;
  border: 3px solid #5c1800; border-radius: 12px;
  padding: 10px 32px; font-family: 'Nanum Pen Script', cursive;
  font-size: 20px; cursor: pointer;
  box-shadow: 0 4px 0 #3a0e00;
  transition: transform .1s, box-shadow .1s; letter-spacing: 2px;
}
.restart-btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 #3a0e00; }
.restart-btn:active { transform: translateY(2px);  box-shadow: 0 2px 0 #3a0e00; }

/* 배경 전환 애니메이션 */
@keyframes sway   { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }
@keyframes float  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes walk   { 0%,100%{transform:translateX(0)} 50%{transform:translateX(4px)} }
@keyframes pulse  { 0%,100%{opacity:.8} 50%{opacity:1} }
@keyframes sunPulse { 0%,100%{box-shadow:0 0 30px 10px rgba(255,220,50,.5)} 50%{box-shadow:0 0 50px 20px rgba(255,220,50,.7)} }

/* ── 콤보 토스트 ── */
@keyframes comboIn {
  0%   { opacity:0; transform: translate(-50%,-50%) scale(.4) rotate(-8deg); }
  55%  { opacity:1; transform: translate(-50%,-50%) scale(1.12) rotate(2deg); }
  75%  { transform: translate(-50%,-50%) scale(.96) rotate(-1deg); }
  100% { opacity:1; transform: translate(-50%,-50%) scale(1) rotate(0deg); }
}
@keyframes comboOut {
  0%   { opacity:1; transform: translate(-50%,-50%) scale(1); }
  100% { opacity:0; transform: translate(-50%,-50%) scale(1.3) translateY(-30px); }
}
@keyframes starPop {
  0%   { opacity:0; transform: scale(0) rotate(0deg); }
  60%  { opacity:1; transform: scale(1.3) rotate(20deg); }
  100% { opacity:1; transform: scale(1) rotate(0deg); }
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity:1; }
  100% { transform: translateY(80px) rotate(360deg); opacity:0; }
}

.combo-toast {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: 200;
  pointer-events: none;
  text-align: center;
  display: none;
}
.combo-toast.show { display: block; animation: comboIn .45s cubic-bezier(.34,1.56,.64,1) forwards; }
.combo-toast.hide { animation: comboOut .35s ease-in forwards; }

.combo-main {
  font-family: 'Nanum Pen Script', cursive;
  font-size: clamp(44px, 14vw, 68px);
  color: #fff;
  text-shadow:
    0 0 20px rgba(255,220,50,.9),
    3px 3px 0 #8B2500,
    -1px -1px 0 #8B2500;
  line-height: 1;
  letter-spacing: 2px;
  white-space: nowrap;
}
.combo-sub {
  font-family: 'Gaegu', cursive;
  font-size: clamp(14px, 4vw, 18px);
  color: #ffe566;
  text-shadow: 1px 1px 0 #5c1800, 0 0 12px rgba(255,180,0,.8);
  margin-top: 4px;
  letter-spacing: 1px;
}
.combo-stars {
  font-size: 22px;
  letter-spacing: 4px;
  display: block;
  margin-bottom: 4px;
  animation: starPop .5s cubic-bezier(.34,1.56,.64,1) .1s both;
}

/* 콤보 카운터 배지 */
.combo-badge {
  position: fixed;
  top: 12px; right: 12px;
  z-index: 50;
  background: rgba(139,37,0,.88);
  border: 2px solid #ffe566;
  border-radius: 20px;
  padding: 4px 14px;
  font-family: 'Nanum Pen Script', cursive;
  font-size: 16px;
  color: #ffe566;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
  opacity: 0;
  transform: scale(.8);
  transition: opacity .3s, transform .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
}
.combo-badge.visible { opacity: 1; transform: scale(1); }
.combo-badge.pulse-anim { animation: correctPop .3s ease; }

/* ══ 타이틀 화면 ══ */
#titleScreen {
  position: fixed; inset: 0; z-index: 500;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity .7s ease;
}
#titleScreen.hidden { opacity: 0; pointer-events: none; }

/* 슬라이드 배경 */
.title-bg-slide {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center top;
  opacity: 0;
  transition: opacity 1.2s ease;
}
.title-bg-slide.active { opacity: 1; }

/* 타이틀 뒤 완전 차단 레이어 */
#titleScreen::before {
  content: '';
  position: absolute; inset: 0;
  background: #000;
  z-index: 0;
  pointer-events: none;
}
/* 배경 위 약한 그라데이션 */
#titleScreen::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,.15) 0%,
    rgba(0,0,0,.05) 40%,
    rgba(0,0,0,.2) 100%
  );
  z-index: 2;
  pointer-events: none;
}

/* 타이틀 콘텐츠 전체 (z-index 2로 오버레이 위에) */
.title-content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center;
  width: 100%;
  /* 화면 중앙보다 살짝 아래 */
  margin-top: 8vh;
}

/* 타이틀 텍스트 패널 */
.title-panel {
  background: rgba(139,37,0,.88);
  border: 4px solid #5c1800;
  border-radius: 16px;
  padding: 12px 28px 14px;
  text-align: center;
  box-shadow: 0 6px 0 #3a0e00, 0 10px 24px rgba(0,0,0,.5);
  backdrop-filter: blur(4px);
  margin-bottom: 0;
}
.title-main {
  font-family: 'Nanum Pen Script', cursive;
  font-size: clamp(24px, 6.5vw, 34px);
  color: #ffe566;
  text-shadow: 2px 2px 0 #5c1800;
  letter-spacing: 2px; line-height: 1.2;
}
.title-sub {
  font-size: 11px; color: #ffcf80;
  opacity: .9; letter-spacing: 1px; margin-top: 3px;
}

/* 캐릭터 + 시작버튼 묶음 */
.title-char-group {
  position: relative;
  display: flex; align-items: flex-end;
  justify-content: center;
  width: 320px;
  height: 240px;
  margin: 0;
}
.title-char {
  width: 110px; height: 240px;
  object-fit: contain; object-position: bottom;
  filter: drop-shadow(3px 6px 12px rgba(0,0,0,.4));
  opacity: 0;
  transition: opacity 1.0s ease;
  position: absolute; bottom: 0;
}
.title-char.active { opacity: 1; }
/* 왼쪽 여자: 왼쪽에 배치, 오른쪽 향하도록 */
.title-char-f { left: 0; }
/* 오른쪽 남자 */
.title-char-m { right: 0; transform: scaleX(-1); }

/* 시작버튼 — 캐릭터 가운데 고정 */
.start-btn {
  position: absolute;
  bottom: 20px;
  left: 50%; transform: translateX(-50%);
  z-index: 5;
  background: #ffe566;
  color: #8B2500;
  border: 4px solid #c88a30;
  border-radius: 50px;
  padding: 13px 44px;
  font-family: 'Nanum Pen Script', cursive;
  font-size: 26px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 6px 0 #8B6000, 0 10px 24px rgba(0,0,0,.3);
  transition: transform .1s, box-shadow .1s;
  letter-spacing: 3px;
  white-space: nowrap;
  animation: startPulse 2s ease-in-out infinite;
}
.start-btn:hover  { transform: translateX(-50%) translateY(-3px); box-shadow: 0 9px 0 #8B6000, 0 14px 28px rgba(0,0,0,.35); }
.start-btn:active { transform: translateX(-50%) translateY(3px);  box-shadow: 0 3px 0 #8B6000; }

/* 타이틀 오디오 버튼 */
.title-audio-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 12px;
}
.audio-chip {
  appearance: none;
  border: 2px solid #c88a30;
  border-radius: 999px;
  background: linear-gradient(180deg, #fffaf0 0%, #f8e7b6 100%);
  color: #8B2500;
  min-width: 128px;
  padding: 10px 18px 11px;
  font-family: 'Nanum Pen Script', cursive;
  font-size: 24px;
  font-weight: 700;
  line-height: 1;
  cursor: pointer;
  box-shadow: 0 4px 0 #b7770d, 0 8px 16px rgba(0,0,0,.16);
  transition: transform .12s ease, box-shadow .12s ease, filter .12s ease, background .12s ease, color .12s ease;
}
.audio-chip:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 6px 0 #b7770d, 0 10px 18px rgba(0,0,0,.18);
}
.audio-chip:active {
  transform: translateY(2px) scale(.98);
  box-shadow: 0 2px 0 #b7770d, 0 5px 10px rgba(0,0,0,.12);
}
.audio-chip.active {
  background: linear-gradient(180deg, #ffe566 0%, #f7c22d 100%);
  color: #6a2800;
  border-color: #b7770d;
  box-shadow: 0 4px 0 #8a5a00, 0 10px 18px rgba(0,0,0,.22), 0 0 0 4px rgba(255,229,102,.25);
}
.audio-chip.muted {
  background: linear-gradient(180deg, #f3ede1 0%, #e8dcc4 100%);
  color: #7a6b55;
  border-color: #cbb38b;
  box-shadow: 0 4px 0 #ab9168, 0 8px 15px rgba(0,0,0,.12);
}
.audio-note {
  font-size: 12px;
  color: #ffefb9;
  text-shadow: 0 1px 2px rgba(0,0,0,.45);
  margin-top: 4px;
}

/* 인디케이터 */
.title-dots {
  display: flex; gap: 8px; margin-top: 14px;
}
.title-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,.45);
  transition: background .3s, transform .3s;
}
.title-dot.active { background: #ffe566; transform: scale(1.4); }

@keyframes startPulse {

      placeholder="이름을 입력해줘" maxlength="10"

      <button class="name-confirm-btn" onclick="confirmName()">등록</button>

  <span class="badge-toast-icon" id="badgeToastIcon">🏅</span>

</div>

<!-- ══ 배지 팝업 ══ -->
<div class="badge-popup" id="badgePopup">
  <div class="badge-card">
    <div class="badge-card-header">🏅 나의 배지</div>

<audio id="bgmAudio" src="Layered Thoughts.mp3" loop preload="auto"></audio>

<script>

// ══ 배지 시스템 ══
const BADGE_KEY = 'limitgame_badges';
const BADGE_FAIL_KEY = 'limitgame_fail_streak';
const BGM_KEY = 'limitgame_bgm_on';
let bgmOn = localStorage.getItem(BGM_KEY) !== '0';
const bgmAudio = document.getElementById('bgmAudio');
let bgmUnlocked = false;

function ensureBGM() {
  if (!bgmAudio) return null;
  bgmAudio.volume = 0.28;
  return bgmAudio;
}

function syncBgmUI() {
  const chip = document.getElementById('bgmChip');
  if (!chip) return;
  chip.textContent = bgmOn ? '🎵 BGM ON' : '🎵 BGM OFF';
  chip.classList.toggle('active', bgmOn);
  chip.classList.toggle('muted', !bgmOn);
}

function playBGM(restart = false) {
  const audio = ensureBGM();
  if (!audio || !bgmOn) return;
  if (restart) {
    try { audio.currentTime = 0; } catch(e) {}
  }
  const p = audio.play();
  if (p && p.then) p.then(() => { bgmUnlocked = true; }).catch(() => {});
}

function stopBGM(reset = false) {
  const audio = ensureBGM();
  if (!audio) return;
  audio.pause();
  if (reset) {
    try { audio.currentTime = 0; } catch(e) {}
  }
}

function unlockBGM() {
  const audio = ensureBGM();
  if (!audio || bgmUnlocked) return;
  const p = audio.play();
  if (p && p.then) {
    p.then(() => {
      audio.pause();
      try { audio.currentTime = 0; } catch(e) {}
      bgmUnlocked = true;
      if (isTitleActive() || isOverlayVisible()) playBGM();
    }).catch(() => {});
  }
}

function isTitleActive() {
  const ts = document.getElementById('titleScreen');
  return !!ts && ts.style.display !== 'none' && !ts.classList.contains('hidden');
}

function isOverlayVisible() {
  const ov = document.getElementById('overlay');
  return !!ov && ov.classList.contains('visible');
}

function toggleBGM() {
  bgmOn = !bgmOn;
  localStorage.setItem(BGM_KEY, bgmOn ? '1' : '0');
  if (bgmOn) {
    unlockBGM();
    if (isTitleActive() || isOverlayVisible()) playBGM();
  } else {
    stopBGM();
  }
  syncBgmUI();
}

// 배지 정의
const BADGE_DEFS = [
  { id:'first',    icon:'🌱', name:'첫걸음',       desc:'첫 게임 완료',             check: (s,f,c) => true },
  { id:'stage5',   icon:'🥉', name:'5단계 돌파',    desc:'5라운드 이상 도달',        check: (s,f,c) => s >= 5 },
  { id:'stage10',  icon:'🥈', name:'10단계 돌파',   desc:'10라운드 이상 도달',       check: (s,f,c) => s >= 10 },
  { id:'stage15',  icon:'🥇', name:'15단계 돌파',   desc:'15라운드 이상 도달',       check: (s,f,c) => s >= 15 },
  { id:'stage20',  icon:'💎', name:'20단계 돌파',   desc:'20라운드 이상 도달',       check: (s,f,c) => s >= 20 },
  { id:'fail1',    icon:'😅', name:'1라운드 탈락',  desc:'1라운드에서 탈락',         check: (s,f,c) => s === 1 },
  { id:'fail10',   icon:'🔥', name:'불굴의 의지',   desc:'5라운드 이내 10번 실패',   check: (s,f,c) => f >= 10 },
  { id:'combo10',  icon:'⚡', name:'콤보 마스터',   desc:'10콤보 달성',              check: (s,f,c) => c >= 10 },
  { id:'newbest',  icon:'👑', name:'신기록 달성',   desc:'최고기록 경신',            check: (s,f,c,nb) => nb },
];

function getBadges() {
  try { return JSON.parse(localStorage.getItem(BADGE_KEY) || '[]'); }
  catch(e) { return []; }
}

function getFailStreak() {
  try {
    const d = JSON.parse(localStorage.getItem(BADGE_FAIL_KEY) || '{"count":0,"scores":[]}');
    return d;
  } catch(e) { return {count:0, scores:[]}; }
}

function updateFailStreak(score) {
  const d = getFailStreak();
  if (score <= 5) {
    d.scores.push(score);
    // 최근 기록만 유지
    if (d.scores.length > 20) d.scores = d.scores.slice(-20);
    // 최근 기록 중 5라운드 이내 실패 횟수
    d.count = d.scores.filter(s => s <= 5).length;
  }
  localStorage.setItem(BADGE_FAIL_KEY, JSON.stringify(d));
  return d.count;
}

function checkAndAwardBadges(score, maxCombo, isNewBest) {
  const earned   = getBadges();
  const earnedIds = earned.map(b => b.id);
  const failCount = updateFailStreak(score);
  const newBadges = [];

  for (const def of BADGE_DEFS) {
    if (earnedIds.includes(def.id)) continue;
    if (def.check(score, failCount, maxCombo, isNewBest)) {
      earned.push({ id: def.id, date: new Date().toLocaleDateString('ko-KR') });
      newBadges.push(def);
    }
  }
  localStorage.setItem(BADGE_KEY, JSON.stringify(earned));
  return newBadges;
}

function showBadgeToast(badges) {
  if (!badges.length) return;
  let i = 0;
  function next() {
    if (i >= badges.length) return;
    const b = badges[i++];
    const toast = document.getElementById('badgeToast');
    document.getElementById('badgeToastIcon').textContent = b.icon;
    document.getElementById('badgeToastName').textContent = b.name;
    toast.classList.remove('hide');
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
      toast.classList.add('hide');
      setTimeout(() => {
        toast.classList.remove('hide');
        toast.style.display = 'none';
        setTimeout(() => { toast.style.display = ''; next(); }, 50);
      }, 420);
    }, 2000);
  }
  next();
}

function openBadges() {
  renderBadges();
  document.getElementById('badgePopup').classList.add('visible');
}

function closeBadges() {
  document.getElementById('badgePopup').classList.remove('visible');
}

function renderBadges() {
  const earned = getBadges();
  const earnedIds = earned.map(b => b.id);
  const grid = document.getElementById('badgeGrid');
  grid.innerHTML = BADGE_DEFS.map(def => {
    const isEarned = earnedIds.includes(def.id);
    const earnedData = earned.find(b => b.id === def.id);
    return `
      <div class="badge-item ${isEarned ? 'earned' : 'locked'}">
        <div class="badge-item-icon">${def.icon}</div>
        <div class="badge-item-name">${def.name}</div>
        <div class="badge-item-desc">${isEarned ? (earnedData?.date || '') : def.desc}</div>
      </div>`;
  }).join('');
}


// ══ 랭킹 시스템 ══
const RANK_KEY = 'limitgame_ranking';

function getRanking() {
  try { return JSON.parse(localStorage.getItem(RANK_KEY) || '[]'); }
  catch(e) { return []; }
}

function saveRanking(records) {
  localStorage.setItem(RANK_KEY, JSON.stringify(records));
}

function addRankRecord(name, score, stageName) {
  const records = getRanking();
  records.push({
    name: name || '익명',
    score,
    stage: stageName,
    date: new Date().toLocaleDateString('ko-KR', {month:'2-digit', day:'2-digit'})
  });
  records.sort((a, b) => b.score - a.score);
  saveRanking(records.slice(0, 20));
}

function openNamePopup(score, stageName) {
  window._finalScore = score;
  window._finalStage = stageName;
  document.getElementById('nameScore').textContent = score;
  document.getElementById('nameInput').value = '';
  document.getElementById('namePopup').classList.add('visible');
  setTimeout(function() {
    var inp = document.getElementById('nameInput');
    if (inp) inp.focus();
  }, 300);
}

function confirmName() {
  const name = document.getElementById('nameInput').value.trim() || '익명';
  addRankRecord(name, window._finalScore, window._finalStage);
  document.getElementById('namePopup').classList.remove('visible');
  document.getElementById('overlay').classList.add('visible');
  if (bgmOn) playBGM();
}

function skipName() {
  document.getElementById('namePopup').classList.remove('visible');
  document.getElementById('overlay').classList.add('visible');
  if (bgmOn) playBGM();
}

function openRanking() {
  renderRanking();
  document.getElementById('rankPopup').classList.add('visible');
}

function closeRanking() {
  document.getElementById('rankPopup').classList.remove('visible');
}

function renderRanking() {
  const records = getRanking();
  const list = document.getElementById('rankList');
  if (records.length === 0) {
    list.innerHTML = '<div class="rank-empty">아직 기록이 없어.<br>첫 도전자가 되어봐!</div>';
    return;
  }
  const medals = ['🥇','🥈','🥉'];
  list.innerHTML = records.map((r, i) => `
    <div class="rank-row">
      <div class="rank-pos">${i < 3 ? medals[i] : (i+1)}</div>
      <div class="rank-name">${r.name}</div>
      <div class="rank-stage">${r.stage}</div>
      <div class="rank-score">${r.score}</div>
      <div class="rank-date">${r.date}</div>
    </div>
  `).join('');
}


// ══ 타이틀 슬라이드 ══
let titleIdx = 0;
const TITLE_COUNT = 7;
let titleTimer = null;

function titleNext() {
  const prev = titleIdx;
  titleIdx = (titleIdx + 1) % TITLE_COUNT;

  // 배경 전환
  document.getElementById('tbg-' + prev).classList.remove('active');
  document.getElementById('tbg-' + titleIdx).classList.add('active');

  // 캐릭터 전환
  document.getElementById('tchar-f-' + prev).classList.remove('active');
  document.getElementById('tchar-m-' + prev).classList.remove('active');
  document.getElementById('tchar-f-' + titleIdx).classList.add('active');
  document.getElementById('tchar-m-' + titleIdx).classList.add('active');

  // 인디케이터
  document.getElementById('tdot-' + prev).classList.remove('active');
  document.getElementById('tdot-' + titleIdx).classList.add('active');
}

// 1.8초 단위 슬라이드
titleTimer = setInterval(titleNext, 1800);

function enterGame() {
  stopBGM();
  clearInterval(titleTimer);
  const ts = document.getElementById('titleScreen');
  ts.classList.add('hidden');

  // 게임 요소 표시
  const gw = document.getElementById('gameWrapper');
  gw.style.display = 'flex';
  gw.style.opacity = '0';
  gw.style.transition = 'opacity .6s ease';
  requestAnimationFrame(() => { gw.style.opacity = '1'; });

  // overlay display 복원
  document.getElementById('overlay').style.display = '';

  // combo-toast 복원
  document.getElementById('comboToast').style.display = '';

  setTimeout(() => { ts.style.display = 'none'; }, 700);
  setTimeout(startGame, 400);
}

// ── 단계 정의 ──
const STAGES = [
  { min:1,  max:2,  name:"유아",     emoji:"🍼", scene:0 },
  { min:3,  max:4,  name:"유치원",   emoji:"🎒", scene:1 },
  { min:5,  max:6,  name:"초등학생", emoji:"✏️", scene:2 },
  { min:7,  max:9,  name:"중학생",   emoji:"🚲", scene:3 },
  { min:10, max:12, name:"고등학생", emoji:"📚", scene:4 },
  { min:13, max:15, name:"대학생",   emoji:"🎓", scene:5 },
  { min:16, max:999,name:"대학원생", emoji:"🔬", scene:6 },
];

const MSGS = {
  "유아":     ["응애...", "아직 아기잖아."],
  "유치원":   ["선생님한테 혼날 뻔.", "유치원도 쉽지 않네."],
  "초등학생": ["받아쓰기보다 어렵다.", "집중력이 먼저 하교했다."],
  "중학생":   ["중간고사보다 어렵네.", "여기서 틀리네."],
  "고등학생": ["야자 중에 졸았나.", "이건 진짜 아깝다."],
  "대학생":   ["MT 갔다 온 것 같다.", "집중력이 먼저 꺼졌다."],
  "대학원생": ["논문보다 어렵다...", "지도교수님께 혼날 뻔."],
};
const DEFAULT_MSGS = ["아깝다.", "한 끗 차이였다.", "다시 하면 될 거 같은데."];

const FRUITS = ['circle','square','triangle','star'];
const EMOJI  = { circle:'🔴', square:'🔵', triangle:'🟡', star:'🟢' };

// ── 상태 머신 ──
// IDLE → SHOWING → WAITING → GAMEOVER → IDLE
const STATE = { IDLE:'idle', SHOWING:'showing', WAITING:'waiting', GAMEOVER:'gameover' };
let gameState = STATE.IDLE;

let sequence = [], playerIndex = 0, round = 0;
let best = parseInt(localStorage.getItem('limitgame_best') || '0');
let currentSceneIdx = 0;
let activeTimers = [];
let combo = 0;  // 연속 성공 라운드 수

// 콤보 메시지 정의
const COMBO_DATA = {
  5:  { main:'5 콤보!',   sub:'집중력 살아있네',    stars:'⭐⭐⭐',    },
  10: { main:'10 콤보!',  sub:'이거 진짜 되는데?',  stars:'🌟🌟🌟🌟',  },
  15: { main:'15 콤보!',  sub:'여기서 멈추면 아깝다', stars:'💫💫💫💫💫', },
  20: { main:'20 콤보!!', sub:'대학원생 각이다',      stars:'🔥🔥🔥🔥🔥', },
};

document.getElementById('best').textContent = best;
syncBgmUI();
setTimeout(() => { if (bgmOn && isTitleActive()) playBGM(); }, 120);
document.addEventListener('pointerdown', unlockBGM, { passive:true, once:true });

// 클릭 이벤트 — 단 하나의 진입점
document.querySelectorAll('.btn').forEach(b =>
  b.addEventListener('click', () => {
    // WAITING 상태에서만 입력 처리 (완전한 클릭 잠금)
    if (gameState !== STATE.WAITING) return;
    handleInput(b.dataset.fruit);
  })
);

function safeTimeout(fn, delay) {
  const id = setTimeout(fn, delay);
  activeTimers.push(id);
  return id;
}

function clearAllTimers() {
  activeTimers.forEach(id => clearTimeout(id));
  activeTimers = [];
}

// ── 게임 흐름 ──
function startGame() {
  stopBGM();
  clearAllTimers();
  gameState = STATE.IDLE;
  // 모든 팝업 닫기
  const ov = document.getElementById('overlay');
  ov.style.display = '';
  ov.classList.remove('visible');
  document.getElementById('namePopup').classList.remove('visible');
  document.getElementById('rankPopup').classList.remove('visible');
  document.getElementById('badgePopup').classList.remove('visible');
  // gameWrapper 항상 보이게
  const gw = document.getElementById('gameWrapper');
  if (gw) { gw.style.display = 'flex'; gw.style.opacity = '1'; }
  document.querySelectorAll('.btn').forEach(b => {
    b.classList.remove('lit', 'wrong', 'correct', 'tap', 'ripple', 'disabled');
    b.style.opacity = '';
  });

  sequence = []; playerIndex = 0; round = 0; combo = 0;
  updateRound(0);
  updateStageUI(0);
  updateComboBadge(0);
  setStatus('— 시작 —');
  safeTimeout(nextRound, 900);
}

function nextRound() {
  playerIndex = 0; round++;
  updateRound(round);
  updateStageUI(round);
  sequence.push(FRUITS[Math.floor(Math.random() * 4)]);
  setStatus('잘 봐.');
  gameState = STATE.SHOWING;   // ← 이 순간부터 클릭 불가
  playSequence(() => {
    gameState = STATE.WAITING; // ← 시퀀스 끝나면 클릭 허용
    setStatus('따라해봐.');
  });
}

function playSequence(cb) {
  let i = 0;
  function next() {
    if (i >= sequence.length) { safeTimeout(cb, 300); return; }
    const shape = sequence[i++];
    const btn = document.getElementById('btn-' + shape);
    btn.classList.add('lit');
    safeTimeout(() => {
      btn.classList.remove('lit');
      safeTimeout(next, 180);
    }, 540);
  }
  safeTimeout(next, 400);
}

function handleInput(shape) {
  const btn = document.getElementById('btn-' + shape);

  if (shape !== sequence[playerIndex]) {
    // 오답: shake + 전체 버튼 어둡게
    gameState = STATE.GAMEOVER;
    btn.classList.add('wrong');
    document.querySelectorAll('.btn').forEach(b => {
      if (b !== btn) b.style.opacity = '.35';
    });
    // 일반 setTimeout 사용 — clearAllTimers 영향 안 받음
    setTimeout(() => {
      btn.classList.remove('wrong');
      document.querySelectorAll('.btn').forEach(b => b.style.opacity = '');
      gameOver();
    }, 480);
    return;
  }

  // 정답 tap + ripple
  btn.classList.add('tap', 'ripple');
  safeTimeout(() => {
    btn.classList.remove('tap');
    safeTimeout(() => btn.classList.remove('ripple'), 200);
  }, 140);

  playerIndex++;
  if (playerIndex === sequence.length) {
    // 라운드 클리어
    gameState = STATE.SHOWING;
    combo++;
    updateComboBadge(combo);

    // 콤보 마일스톤 체크 (5, 10, 15, 20)
    if (COMBO_DATA[combo]) showComboToast(combo);

    document.querySelectorAll('.btn').forEach(b => {
      b.classList.add('correct');
      safeTimeout(() => b.classList.remove('correct'), 380);
    });
    setStatus('맞아.');
    safeTimeout(nextRound, 900);
  }
}

function gameOver() {
  if (bgmOn) setTimeout(() => playBGM(true), 240);
  // 1. 점수/단계 즉시 캡처 (어떤 리셋보다 먼저)
  const finalScore = round;
  const stage      = getStage(round);
  const finalStage = stage.name;

  // 2. 최고기록 업데이트
  const newBest = finalScore > best;
  if (newBest) {
    best = finalScore;
    localStorage.setItem('limitgame_best', best);
    document.getElementById('best').textContent = best;
  }

  // 3. 결과 화면 내용 세팅
  const msgs = MSGS[finalStage] || DEFAULT_MSGS;
  const msg  = msgs[Math.floor(Math.random() * msgs.length)];
  document.getElementById('resultStageEmoji').textContent = stage.emoji;
  document.getElementById('resultStageName').textContent  = finalStage + ' 수준';
  document.getElementById('resultRound').textContent      = finalScore;
  document.getElementById('resultBest').innerHTML =
    `최고기록 <span>${best}</span> 라운드${newBest ? ' 🎉' : ''}`;
  document.getElementById('resultSeq').textContent =
    sequence.map(f => EMOJI[f]).join(' ');
  document.getElementById('resultMsg').textContent = msg;

  // 4. 결과 화면 캐릭터
  const sceneIdx = stage.scene;
  document.getElementById('resultCharLeft').src  = `female_${sceneIdx}.png`;
  document.getElementById('resultCharRight').src = `male_${sceneIdx}.png`;

  // 5. 배지 체크
  const isNewBest = newBest;
  const newBadges = checkAndAwardBadges(finalScore, combo, isNewBest);

  // 6. 상태/라운드 리셋
  gameState = STATE.GAMEOVER;
  updateRound(0);
  setStatus('— 준비 중 —');

  // 배지 토스트 (팝업보다 먼저)
  if (newBadges.length) showBadgeToast(newBadges);

  // 6. 이름 입력 팝업 (독립 setTimeout)
  window._finalScore = finalScore;
  window._finalStage = finalStage;
  window.setTimeout(function() {
    document.getElementById('nameScore').textContent = window._finalScore;
    document.getElementById('nameInput').value = '';
    document.getElementById('namePopup').classList.add('visible');
    setTimeout(function() {
      var inp = document.getElementById('nameInput');
      if (inp) inp.focus();
    }, 300);
  }, 500);
}

// ── 헬퍼 ──
function getStage(r) {
  return STAGES.find(s => r >= s.min && r <= s.max) || STAGES[0];
}
function updateStageUI(r) {
  const stage = r === 0 ? STAGES[0] : getStage(r);
  document.getElementById('stageBadge').textContent = stage.emoji + ' ' + stage.name;

  // 배경 씬 전환
  if (stage.scene !== currentSceneIdx) {
    document.getElementById('scene-' + currentSceneIdx).classList.remove('active');
    document.getElementById('scene-' + stage.scene).classList.add('active');
    currentSceneIdx = stage.scene;
  }

  // 캐릭터 전환
  const idx = stage.scene;
  document.querySelectorAll('#charLeft  .char-stage').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('#charRight .char-stage').forEach(el => el.classList.remove('active'));
  const cl = document.getElementById('cl-' + idx);
  const cr = document.getElementById('cr-' + idx);
  if (cl) cl.classList.add('active');
  if (cr) cr.classList.add('active');
}
function updateRound(n) { document.getElementById('round').textContent = n; }
function setStatus(m)   { document.getElementById('status').textContent = m; }

// ── 콤보 헬퍼 ──
function updateComboBadge(n) {
  const badge = document.getElementById('comboBadge');
  if (n < 2) { badge.classList.remove('visible'); return; }
  badge.textContent = '🔥 ' + n + ' 콤보';
  badge.classList.add('visible');
  badge.classList.remove('pulse-anim');
  void badge.offsetWidth; // reflow
  badge.classList.add('pulse-anim');
}

function showComboToast(n) {
  const data  = COMBO_DATA[n];
  const toast = document.getElementById('comboToast');
  document.getElementById('comboStars').textContent = data.stars;
  document.getElementById('comboMain').textContent  = data.main;
  document.getElementById('comboSub').textContent   = data.sub;

  toast.classList.remove('hide');
  toast.classList.add('show');

  safeTimeout(() => {
    toast.classList.remove('show');
    toast.classList.add('hide');
    safeTimeout(() => {
      toast.classList.remove('hide');
      toast.style.display = 'none';
      safeTimeout(() => { toast.style.display = ''; }, 50);
    }, 360);
  }, 1600);
}

// ── 시작 ──
// 타이틀에서 시작버튼으로 진입
